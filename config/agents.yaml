# Agent System Configuration

agents:
  max_concurrent: 6
  max_concurrent_reserved: 10

  roles:
    - name: orchestrator
      model_priority:
        - provider: deepseek
          model: deepseek-chat
      description: "Architecture design, task decomposition, complex reasoning"
      timeout: 300

    - name: frontend
      model_priority:
        - provider: minimax
          model: MiniMax-M2.7
      description: "Frontend code generation (React/Vue)"
      timeout: 600

    - name: backend
      model_priority:
        - provider: minimax
          model: MiniMax-M2.7
      description: "Backend code generation (FastAPI/Express)"
      timeout: 600

    - name: database
      model_priority:
        - provider: minimax
          model: MiniMax-M2.7
      description: "Database schema and migration generation"
      timeout: 300

    - name: qa
      model_priority:
        - provider: minimax
          model: MiniMax-M2.7
      description: "Test generation and quality assurance"
      timeout: 600

sandbox:
  provider: e2b
  reuse: false
  allow_network: true

memory:
  provider: chroma
  path: ./chroma_data

logging:
  level: info
  retention_days: 180
