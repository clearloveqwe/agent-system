name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint
        run: ruff check src/ tests/

      - name: Test
        run: pytest tests/ --cov=src/ --cov-report=term --cov-fail-under=90

  # High-risk review gate
  high-risk-review:
    if: contains(github.event.pull_request.labels.*.name, 'high-risk')
    runs-on: ubuntu-latest
    steps:
      - name: Block until human approved
        run: |
          echo "⚠️ This PR contains high-risk changes and requires human review."
          echo "Review the changes and approve via PR review or remove the 'high-risk' label."
          exit 1
